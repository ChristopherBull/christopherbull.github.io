name: Lighthouse

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lighthouse:
    name: Audit
    runs-on: ubuntu-latest
    env:
      LHCI_VER: 0.15.x
    steps:
      - uses: actions/checkout@v6
        with:
          # Fix for LHCI status checks not appearing for commits/pull_reqs
          # https://github.com/GoogleChrome/lighthouse-ci/issues/172
          ref: ${{ github.event.pull_request.head.sha }}
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

        # Pre-build the dev container image and push it to GHCR to speed up
        # subsequent runs. This image is used in the next step to run
        # Lighthouse CI. Separating the build/push from the test step ensures
        # the image is still published even if later steps fail.
      - name: Pre-build and push dev container image
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}/lighthouse
          cacheFrom: ghcr.io/${{ github.repository }}/lighthouse
          imageTag: latest
          push: ${{ github.ref == 'refs/heads/main' }}

      - name: Run Lighthouse CI in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}/lighthouse
          imageTag: latest
          # Install dependencies and run Lighthouse CI.
          # Note: Do not do full Mise setup (`mise run install-deps`), as many
          # Node dev deps are not needed for Lighthouse CI.
          runCmd: |
            npm install @lhci/cli@$LHCI_VER
            bundle install
            bundle exec jekyll build
            npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
