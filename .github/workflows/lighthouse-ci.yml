name: Lighthouse

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lighthouse:
    name: Audit
    runs-on: ubuntu-latest
    env:
      LHCI_VER: 0.15.x
    steps:
      - uses: actions/checkout@v6
        with:
          # Fix for LHCI status checks not appearing for commits/pull_reqs
          # https://github.com/GoogleChrome/lighthouse-ci/issues/172
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Compute lowercase lighthouse image name
        id: lighthouse-image-name
        # GHCR rejects image names containing uppercase letters.
        # `github.repository` can include uppercase owner/repo segments,
        # so we normalise the name to lowercase.
        run: echo "name=ghcr.io/$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')/lighthouse" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

        # Pre-build the dev container image and push it to GHCR to speed up
        # subsequent runs. This image is used in the next step to run
        # Lighthouse CI. Separating the build/push from the test step ensures
        # the image is still published even if later steps fail.
      - name: Pre-build and push dev container image
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ steps.lighthouse-image-name.outputs.name }}
          cacheFrom: ${{ steps.lighthouse-image-name.outputs.name }}
          imageTag: latest
          push: ${{ github.ref == 'refs/heads/main' && 'always' || 'never' }}

      - name: Run Lighthouse CI in devcontainer (extra Chrome flags)
        id: lighthouse-extra-flags
        continue-on-error: true
        uses: devcontainers/ci@v0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        with:
          imageName: ${{ steps.lighthouse-image-name.outputs.name }}
          imageTag: latest
          env: |
            CI=true
            GITHUB_TOKEN
            LHCI_GITHUB_APP_TOKEN
          runCmd: |
            mise exec -- npm install --no-save --no-package-lock --no-audit --no-fund @lhci/cli@${{ env.LHCI_VER }}
            mise exec -- bundle exec jekyll build
            # This workflow only runs in GitHub Actions, where hosted Ubuntu
            # runners use a nested devcontainer with constrained sandbox/shared
            # memory behavior, so Chrome needs extra CI-only launch flags here.
            mise exec -- npx lhci autorun --collect.settings.chromeFlags="--no-sandbox --disable-dev-shm-usage"

      - name: Run Lighthouse CI in devcontainer (default Chrome flags)
        id: lighthouse-default-flags
        if: ${{ always() }}
        continue-on-error: true
        uses: devcontainers/ci@v0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        with:
          imageName: ${{ steps.lighthouse-image-name.outputs.name }}
          imageTag: latest
          env: |
            CI=true
            GITHUB_TOKEN
            LHCI_GITHUB_APP_TOKEN
          runCmd: |
            mise exec -- npm install --no-save --no-package-lock --no-audit --no-fund @lhci/cli@${{ env.LHCI_VER }}
            mise exec -- bundle exec jekyll build
            mise exec -- npx lhci autorun

      - name: Summarize Lighthouse comparison
        if: ${{ always() }}
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          | Lighthouse variant | Result |
          | --- | --- |
          | Extra flags (`--no-sandbox --disable-dev-shm-usage`) | ${{ steps.lighthouse-extra-flags.outcome }} |
          | Default Chrome flags | ${{ steps.lighthouse-default-flags.outcome }} |
          EOF

      - name: Fail if baseline Lighthouse run fails
        if: ${{ always() && steps.lighthouse-extra-flags.outcome != 'success' }}
        run: exit 1
