name: Lighthouse

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lighthouse:
    name: Audit
    runs-on: ubuntu-latest
    env:
      CHROME_PATH: /usr/bin/google-chrome-stable
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      LHCI_VER: 0.15.x
    steps:
      - uses: actions/checkout@v6
        with:
          # Fix for LHCI status checks not appearing for commits/pull_reqs
          # https://github.com/GoogleChrome/lighthouse-ci/issues/172
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Extract tool versions
        id: versions
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import re
          import tomllib

          mise = tomllib.loads(pathlib.Path(".mise.toml").read_text())
          lock = pathlib.Path("Gemfile.lock").read_text()
          bundler = re.search(r"^BUNDLED WITH\s*\n\s*([^\s]+)\s*$", lock, re.MULTILINE)

          versions = {
              "node": mise["tools"]["node"]["version"],
              "ruby": mise["tools"]["ruby"]["version"],
              "bundler": bundler.group(1) if bundler else "",
          }

          missing = [name for name, version in versions.items() if not version]
          if missing:
              raise SystemExit(f"Missing version(s): {', '.join(missing)}")

          for name, version in versions.items():
              print(f"{name}={version}")
          PY

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.versions.outputs.node }}
          cache: npm

      - name: Use Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ steps.versions.outputs.ruby }}

      - name: Cache bundled gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ steps.versions.outputs.ruby }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-${{ steps.versions.outputs.ruby }}-

      - name: Install Ruby dependencies
        run: |
          gem install bundler -v "${{ steps.versions.outputs.bundler }}"
          bundle _${{ steps.versions.outputs.bundler }}_ config set --local path 'vendor/bundle'
          bundle _${{ steps.versions.outputs.bundler }}_ install --jobs 4 --retry 3

      - name: Build site
        run: bundle _${{ steps.versions.outputs.bundler }}_ exec jekyll build

      - name: Install Lighthouse CI
        run: npm install --no-save @lhci/cli@$LHCI_VER

      - name: Run the Lighthouse CI
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: npx lhci autorun
