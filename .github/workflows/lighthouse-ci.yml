name: Lighthouse

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lighthouse:
    name: Audit
    runs-on: ubuntu-latest
    env:
      CHROME_PATH: /usr/bin/google-chrome-stable
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      LHCI_VER: 0.15.x
    steps:
      - uses: actions/checkout@v6
        with:
          # Fix for LHCI status checks not appearing for commits/pull_reqs
          # https://github.com/GoogleChrome/lighthouse-ci/issues/172
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Extract Node version from .mise.toml
        id: node_version
        run: echo "version=$(sed -n 's/^[[:space:]]*node[[:space:]]*=[[:space:]]*{[[:space:]]*version[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p' .mise.toml)" >> "$GITHUB_OUTPUT"

      - name: Extract Ruby version from .mise.toml
        id: ruby_version
        run: echo "version=$(sed -n 's/^[[:space:]]*ruby[[:space:]]*=[[:space:]]*{[[:space:]]*version[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p' .mise.toml)" >> "$GITHUB_OUTPUT"

      - name: Extract Bundler version from Gemfile.lock
        id: bundler_version
        run: echo "version=$(awk '/^BUNDLED WITH$/ {getline; gsub(/^[[:space:]]+|[[:space:]]+$/, \"\"); print; exit}' Gemfile.lock)" >> "$GITHUB_OUTPUT"

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node_version.outputs.version }}
          cache: npm

      - name: Use Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ steps.ruby_version.outputs.version }}

      - name: Cache bundled gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ steps.ruby_version.outputs.version }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-${{ steps.ruby_version.outputs.version }}-

      - name: Install Ruby dependencies
        run: |
          gem install bundler -v "${{ steps.bundler_version.outputs.version }}"
          bundle _${{ steps.bundler_version.outputs.version }}_ config set --local path 'vendor/bundle'
          bundle _${{ steps.bundler_version.outputs.version }}_ install --jobs 4 --retry 3

      - name: Build site
        run: bundle _${{ steps.bundler_version.outputs.version }}_ exec jekyll build

      - name: Install Lighthouse CI
        run: npm install --no-save @lhci/cli@$LHCI_VER

      - name: Run the Lighthouse CI
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: npx lhci autorun
