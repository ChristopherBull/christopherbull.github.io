name: Lighthouse

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  statuses: write

jobs:
  lighthouse:
    name: Audit
    runs-on: ubuntu-latest

    env:
      LHCI_VER: 0.15.x

    steps:
      - uses: actions/checkout@v6
        with:
          # Fix for LHCI status checks not appearing for commits/pull_reqs
          # https://github.com/GoogleChrome/lighthouse-ci/issues/172
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Compute lowercase lighthouse image name
        id: lighthouse-image-name
        # GHCR rejects image names containing uppercase letters.
        # `github.repository` can include uppercase owner/repo segments,
        # so we normalise the name to lowercase.
        run: echo "name=ghcr.io/$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')/lighthouse" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show workflow SHA context
        run: |
          echo "github.event_name=${{ github.event_name }}"
          echo "github.sha=${{ github.sha }}"
          echo "github.ref=${{ github.ref }}"
          echo "pr.head.sha=${{ github.event.pull_request.head.sha }}"
          echo "GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_REF=$GITHUB_REF"
          git rev-parse HEAD

        # Pre-build the dev container image and push it to GHCR to speed up
        # subsequent runs. This image is used in the next step to run
        # Lighthouse CI. Separating the build/push from the test step ensures
        # the image is still published even if later steps fail.
      - name: Pre-build and push dev container image
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/devcontainer.ci.json
          imageName: ${{ steps.lighthouse-image-name.outputs.name }}
          cacheFrom: ${{ steps.lighthouse-image-name.outputs.name }}
          imageTag: latest
          # Only push on main branch commits to avoid pushing images for every PR commit.
          push: ${{ github.ref == 'refs/heads/main' && 'always' || 'never' }}

      - name: Run Lighthouse CI in devcontainer
        uses: devcontainers/ci@v0.3
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        with:
          configFile: .devcontainer/devcontainer.ci.json
          imageName: ${{ steps.lighthouse-image-name.outputs.name }}
          imageTag: latest

          env: |
            CI=true
            LHCI_GITHUB_APP_TOKEN

          runCmd: |
            set -euxo pipefail

            echo "=== Mise diagnostics ==="
            mise doctor || true
            mise settings || true

            echo "=== Installing toolchains ==="
            mise install

            echo "=== Installing project dependencies ==="
            mise run install-deps

            echo "=== Installing Lighthouse CI ==="
            mise exec -- npm install --no-save --no-package-lock --no-audit --no-fund @lhci/cli@${{ env.LHCI_VER }}

            echo "=== Building Jekyll site ==="
            mise exec -- bundle exec jekyll build

            echo "=== GitHub Actions context ==="
            echo "GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME"
            echo "GITHUB_SHA=$GITHUB_SHA"
            echo "GITHUB_REF=$GITHUB_REF"
            git rev-parse HEAD

            echo "=== Running Lighthouse CI ==="

            # Hosted runners use nested containerisation with restricted
            # sandbox/shared-memory behaviour, requiring extra Chrome flags.
            #
            # Unsetting GITHUB_TOKEN prevents LHCI attempting GitHub API
            # operations using the default workflow token.
            env -u GITHUB_TOKEN mise exec -- \
              npx lhci autorun \
              --collect.settings.chromeFlags="--no-sandbox --disable-dev-shm-usage"
